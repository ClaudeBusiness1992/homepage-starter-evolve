backend:
  name: github
  repo: ClaudeBusiness1992/hompage-starter
  branch: main
  client_id: Ov23lijI6FiImrx8EcYE
  base_url: https://homepage-starter-evolve.vercel.app
  auth_endpoint: api/auth

media_folder: public/images
public_folder: /images

locale: de

collections:
  - name: "website"
    label: "Website"
    files:

      # ── DESIGN AUSWAHL ───────────────────────────────────────────────
      - name: "design"
        label: "Design auswählen"
        file: "config/design.json"
        fields:
          - label: "Website-Design"
            name: "design"
            widget: "design-picker"
            hint: "Wähle das Layout-Design deiner Website. Nach dem Speichern wird die Seite neu gebaut."

      # ── STAMMDATEN & DESIGN ──────────────────────────────────────────
      - name: "stammdaten"
        label: "Stammdaten & Design"
        file: "config/meta.json"
        fields:
          - label: "Stammdaten"
            name: "meta"
            widget: "object"
            fields:
              - { label: "Website-Name", name: "siteName", widget: "string", hint: "z.B. pixel&code oder Schreinerei Müller" }
              - { label: "Name Akzent (farbiger Teil)", name: "siteNameAccent", widget: "string", hint: "Teil des Namens der farbig hervorgehoben wird, z.B. &code" }
              - { label: "Tagline", name: "tagline", widget: "string", hint: "Kurzer Slogan unter dem Logo, z.B. Websites für kleine Unternehmen" }
              - { label: "SEO-Beschreibung", name: "description", widget: "text", hint: "Wird in Google-Suchergebnissen angezeigt. Ca. 150 Zeichen." }
              - { label: "E-Mail", name: "email", widget: "string" }
              - { label: "Telefon (technisch)", name: "phone", widget: "string", hint: "Format: +491234567890 (für tel:-Links)" }
              - { label: "Telefon (Anzeige)", name: "phoneDisplay", widget: "string", hint: "Wird so auf der Website angezeigt, z.B. +49 (0)123 456 789" }
              - { label: "Copyright-Zeile", name: "copyright", widget: "string", hint: "z.B. © 2025 pixel&code. Alle Rechte vorbehalten." }

          - label: "Design & Farben"
            name: "theme"
            widget: "object"
            fields:
              - { label: "Dunkel (Textfarbe)", name: "ink", widget: "string", hint: "Hauptfarbe für Text und dunkle Hintergründe. Farbcode z.B. #1a1a2e = dunkles Blau-Schwarz" }
              - { label: "Hell (Hintergrund)", name: "cream", widget: "string", hint: "Hintergrundfarbe der Website. z.B. #f5f0e8 = warmes Creme-Weiß" }
              - { label: "Akzent (Hauptfarbe)", name: "accent", widget: "string", hint: "Farbe für Buttons und Highlights. z.B. #e8631b = Orange" }
              - { label: "Akzent Hell (Hover)", name: "accentLight", widget: "string", hint: "Etwas hellere Version der Akzentfarbe, erscheint beim Drüberfahren. z.B. #ff8c42" }
              - { label: "Sekundärfarbe", name: "sage", widget: "string", hint: "Ruhige Zweitfarbe für Badges oder Hintergründe. z.B. #4a7c6f = gedämpftes Grün" }

      # ── WEBSITE-INHALTE ──────────────────────────────────────────────
      - name: "hero"
        label: "Inhalte → Hero (Startbereich)"
        file: "config/content.json"
        fields:
          - label: "Sektionen"
            name: "sections"
            widget: "object"
            fields:
              - label: "Hero"
                name: "hero"
                widget: "object"
                fields:
                  - { label: "Überschrift", name: "headline", widget: "string" }
                  - { label: "Unterzeile", name: "subline", widget: "text" }
                  - { label: "Button 1 Text", name: "ctaPrimary", widget: "string" }
                  - { label: "Button 2 Text", name: "ctaSecondary", widget: "string" }
              - label: "Über uns"
                name: "about"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Überschrift", name: "headline", widget: "string" }
                  - { label: "Unterzeile", name: "subline", widget: "text" }
                  - label: "Team"
                    name: "members"
                    widget: "list"
                    fields:
                      - { label: "Name", name: "name", widget: "string" }
                      - { label: "Rolle", name: "role", widget: "string" }
                      - { label: "Bio", name: "bio", widget: "text" }
                      - { label: "Foto", name: "photo", widget: "image", required: false, default: "" }
              - label: "Leistungen"
                name: "services"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Überschrift", name: "headline", widget: "string" }
                  - { label: "Unterzeile", name: "subline", widget: "text" }
                  - label: "Leistungen"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Icon", name: "icon", widget: "string" }
                      - { label: "Titel", name: "title", widget: "string" }
                      - { label: "Beschreibung", name: "text", widget: "text" }
              - label: "Kennzahlen"
                name: "stats"
                widget: "object"
                collapsed: true
                fields:
                  - label: "Zahlen"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Zahl", name: "value", widget: "number", value_type: "int" }
                      - { label: "Beschriftung", name: "label", widget: "string" }
              - label: "Preise"
                name: "pricing"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Überschrift", name: "headline", widget: "string" }
                  - { label: "Unterzeile", name: "subline", widget: "text" }
                  - label: "Pakete"
                    name: "packages"
                    widget: "list"
                    fields:
                      - { label: "Name", name: "name", widget: "string" }
                      - { label: "Tagline", name: "tagline", widget: "string" }
                      - { label: "Preis", name: "price", widget: "string" }
                      - { label: "Preishinweis", name: "priceNote", widget: "string" }
                      - { label: "Hervorgehoben", name: "featured", widget: "boolean" }
                      - { label: "Badge", name: "badge", widget: "string", required: false, default: "" }
                      - label: "Features"
                        name: "features"
                        widget: "list"
                        field: { label: "Feature", name: "item", widget: "string" }
              - label: "Galerie"
                name: "gallery"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Überschrift", name: "headline", widget: "string" }
                  - { label: "Unterzeile", name: "subline", widget: "text" }
                  - label: "Bilder"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Bild", name: "src", widget: "image" }
                      - { label: "Alt-Text", name: "alt", widget: "string" }
                      - { label: "Bildunterschrift", name: "caption", widget: "string" }
                      - { label: "Kategorie", name: "category", widget: "string" }
              - label: "Kontakt"
                name: "contact"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Überschrift", name: "headline", widget: "string" }
                  - { label: "Unterzeile", name: "subline", widget: "text" }
              - label: "Footer"
                name: "footer"
                widget: "object"
                collapsed: true
                fields:
                  - label: "Links"
                    name: "links"
                    widget: "list"
                    fields:
                      - { label: "Beschriftung", name: "label", widget: "string" }
                      - { label: "URL", name: "href", widget: "string" }

      # ── ERWEITERUNGEN / ADD-ONS ──────────────────────────────────────
      - name: "erweiterungen"
        label: "Erweiterungen / Add-ons"
        file: "config/extras.json"
        fields:
          - label: "Add-ons"
            name: "extras"
            widget: "object"
            fields:

              # ── Master-Toggles (immer sichtbar, auch wenn Detail-Bereiche zugeklappt) ──
              - label: "🎚️ Add-ons aktivieren"
                name: "active"
                widget: "object"
                collapsed: false
                hint: "Hier kannst du jedes Add-on direkt an-/ausschalten. Die Detail-Einstellungen weiter unten kannst du beruhigt zugeklappt lassen — die Toggles funktionieren auch ohne sie zu öffnen."
                fields:
                  - { label: "📅 Countdown / Event", name: "countdown", widget: "boolean", default: false, hint: "Zeigt einen Live-Countdown zu einem Event auf der Website." }
                  - { label: "⭐ Kundenbewertungen", name: "reviews", widget: "boolean", default: false, hint: "Zeigt die Bewertungs-Sektion mit Sternen und Zitaten." }
                  - { label: "📋 Online-Buchung", name: "booking", widget: "boolean", default: false, hint: "Zeigt das Buchungsformular für Termine (Service, Mitarbeiter:in, Datum, Uhrzeit)." }

              # ── Countdown-Detail-Einstellungen ──
              - label: "📅 Countdown — Detail-Einstellungen"
                name: "countdown"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Label (kleine Überschrift)", name: "label", widget: "string", required: false, default: "Save the Date" }
                  - { label: "Überschrift", name: "headline", widget: "string", required: false, default: "" }
                  - { label: "Unterzeile", name: "subline", widget: "text", required: false, default: "" }
                  - { label: "Zieldatum + Uhrzeit", name: "targetDate", widget: "datetime", required: false, default: "", format: "YYYY-MM-DDTHH:mm:ss", date_format: "DD.MM.YYYY", time_format: "HH:mm", hint: "Wann beginnt das Event? Der Counter zählt bis hierhin runter." }
                  - { label: "Button-Text", name: "ctaLabel", widget: "string", required: false, default: "Jetzt anmelden" }
                  - { label: "Button-Link", name: "ctaHref", widget: "string", required: false, default: "#contact", hint: "z.B. #contact für das Kontaktformular oder eine vollständige URL" }
                  - { label: "Text nach Ablauf", name: "expiredText", widget: "string", required: false, default: "Das Event hat begonnen" }

              # ── Bewertungen-Detail-Einstellungen (umgezogen aus Inhalte) ──
              - label: "⭐ Bewertungen — Inhalte"
                name: "reviews"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Label (kleine Überschrift)", name: "label", widget: "string", required: false, default: "Kundenbewertungen" }
                  - { label: "Überschrift", name: "headline", widget: "string", required: false, default: "Was unsere Kunden sagen" }
                  - { label: "Unterzeile", name: "subline", widget: "text", required: false, default: "" }
                  - label: "Bewertungen"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Name", name: "name", widget: "string" }
                      - { label: "Firma", name: "company", widget: "string" }
                      - { label: "Sterne (1–5)", name: "rating", widget: "number", value_type: "int", min: 1, max: 5 }
                      - { label: "Verifiziert", name: "verified", widget: "boolean", default: false }
                      - { label: "Datum", name: "date", widget: "string" }
                      - { label: "Text", name: "text", widget: "text" }

              # ── Buchungs-Detail-Einstellungen ──
              - label: "📋 Buchung — Konfiguration"
                name: "booking"
                widget: "object"
                collapsed: true
                hint: "Online-Buchungsformular. Anfragen werden per E-Mail an Sie versendet. Der Kunde erhält automatisch eine Kalender-Datei (.ics) zum Speichern. Hinweis: Echtzeit-Sync mit Google Calendar ist NICHT enthalten — Sie tragen Termine manuell in Ihren Kalender ein."
                fields:
                  - { label: "Label (kleine Überschrift)", name: "label", widget: "string", required: false, default: "Termin buchen" }
                  - { label: "Überschrift", name: "headline", widget: "string", required: false, default: "Wann darf's losgehen?" }
                  - { label: "Unterzeile", name: "subline", widget: "text", required: false, default: "" }
                  - { label: "E-Mail-Empfänger", name: "emailTo", widget: "string", required: true, hint: "An welche E-Mail-Adresse sollen Buchungsanfragen geschickt werden?" }
                  - { label: "Button-Text", name: "ctaLabel", widget: "string", required: false, default: "Termin anfragen" }
                  - { label: "Bestätigungs-Text nach Absenden", name: "successMessage", widget: "text", required: false, default: "Vielen Dank! Wir melden uns innerhalb von 24h." }
                  - { label: "Vorlauf in Tagen", name: "leadDays", widget: "number", value_type: "int", default: 1, hint: "Wie viele Tage Vorlauf brauchen Sie? (1 = ab morgen buchbar)" }
                  - label: "Verfügbare Services"
                    name: "services"
                    widget: "list"
                    hint: "Welche Dienstleistungen können gebucht werden?"
                    fields:
                      - { label: "Name des Service", name: "name", widget: "string" }
                      - { label: "Dauer in Minuten", name: "duration", widget: "number", value_type: "int", default: 30 }
                  - label: "Mitarbeiter:innen"
                    name: "staff"
                    widget: "list"
                    hint: "Wer kann den Service ausführen?"
                    fields:
                      - { label: "Name", name: "name", widget: "string" }
                  - label: "Verfügbare Uhrzeiten pro Wochentag"
                    name: "availability"
                    widget: "object"
                    hint: "Tragen Sie hier die buchbaren Zeiten pro Wochentag ein. Format pro Zeit: HH:MM (z.B. 09:00). Leer lassen = Tag geschlossen."
                    fields:
                      - { label: "Montag", name: "monday", widget: "list", required: false, default: [], field: { label: "Uhrzeit", name: "time", widget: "string" } }
                      - { label: "Dienstag", name: "tuesday", widget: "list", required: false, default: [], field: { label: "Uhrzeit", name: "time", widget: "string" } }
                      - { label: "Mittwoch", name: "wednesday", widget: "list", required: false, default: [], field: { label: "Uhrzeit", name: "time", widget: "string" } }
                      - { label: "Donnerstag", name: "thursday", widget: "list", required: false, default: [], field: { label: "Uhrzeit", name: "time", widget: "string" } }
                      - { label: "Freitag", name: "friday", widget: "list", required: false, default: [], field: { label: "Uhrzeit", name: "time", widget: "string" } }
                      - { label: "Samstag", name: "saturday", widget: "list", required: false, default: [], field: { label: "Uhrzeit", name: "time", widget: "string" } }
                      - { label: "Sonntag", name: "sunday", widget: "list", required: false, default: [], field: { label: "Uhrzeit", name: "time", widget: "string" } }

      # ── FIRMENDATEN ──────────────────────────────────────────────────
      - name: "firmendaten"
        label: "Firmendaten & Impressum"
        file: "config/legal.json"
        fields:
          - label: "Firmendaten"
            name: "legal"
            widget: "object"
            fields:
              - label: "Firma"
                name: "company"
                widget: "object"
                fields:
                  - { label: "Firmenname", name: "name", widget: "string" }
                  - { label: "Rechtsform", name: "legalForm", widget: "string", hint: "z.B. GmbH, UG, Einzelunternehmen, GbR — oder leer lassen" }
                  - { label: "Vertreten durch", name: "representedBy", widget: "string", hint: "Vor- und Nachname des Geschäftsführers / Inhabers" }
              - label: "Adresse"
                name: "address"
                widget: "object"
                fields:
                  - { label: "Straße + Hausnummer", name: "street", widget: "string" }
                  - { label: "PLZ", name: "zip", widget: "string" }
                  - { label: "Stadt", name: "city", widget: "string" }
                  - { label: "Land", name: "country", widget: "string" }
              - label: "Kontakt (Impressum)"
                name: "contact"
                widget: "object"
                fields:
                  - { label: "Telefon", name: "phone", widget: "string" }
                  - { label: "E-Mail", name: "email", widget: "string" }
              - label: "Handelsregister (optional)"
                name: "register"
                widget: "object"
                fields:
                  - { label: "Typ (HRB / HRA)", name: "type", widget: "string", required: false, default: "" }
                  - { label: "Registernummer", name: "number", widget: "string", required: false, default: "" }
                  - { label: "Registergericht", name: "court", widget: "string", required: false, default: "" }
              - { label: "USt-IdNr. (optional)", name: "vatId", widget: "string", required: false, default: "", hint: "Format: DE123456789 — oder leer lassen" }
              - { label: "Verantwortlicher §18 MStV", name: "responsibleForContent", widget: "string", hint: "Meist der Inhaber / Geschäftsführer" }
              - label: "Hosting-Anbieter"
                name: "hosting"
                widget: "object"
                fields:
                  - { label: "Anbieter", name: "provider", widget: "string" }
                  - { label: "Adresse", name: "address", widget: "string" }
                  - { label: "Datenschutz-URL", name: "privacyUrl", widget: "string" }
