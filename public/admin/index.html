<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Admin</title>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      var h = window.h;
      var createClass = window.createClass;

      var designs = [
        {
          value: '01-warm-local',
          label: '01 — Warm & Lokal',
          desc: 'Klassisch, warm, mit Browser-Mockup',
          type: 'warm',
          bg: '#f5f0e8', ink: '#1a1a2e', accent: '#e8631b',
        },
        {
          value: '02-bold-editorial',
          label: '02 — Bold Editorial',
          desc: 'Magazin-Look, dunkel, Riesen-Typo',
          type: 'editorial',
          bg: '#0d0d0d', ink: '#f0ede8', accent: '#e8631b',
        },
        {
          value: '03-minimal-clean',
          label: '03 — Minimal Clean',
          desc: 'Reduziert, weiß, nur Typo',
          type: 'minimal',
          bg: '#ffffff', ink: '#1a1a1a', accent: '#1a1a1a',
        },
        {
          value: '04-corporate-split',
          label: '04 — Corporate Split',
          desc: 'Zweigeteilt, seriös, Beratung',
          type: 'split',
          bg: '#f5f0e8', bg2: '#1a1a2e', ink: '#1a1a2e', accent: '#e8631b',
        },
        {
          value: '05-vibrant-gradient',
          label: '05 — Vibrant Gradient',
          desc: 'Tech / SaaS, Glow-Effekte',
          type: 'gradient',
          bg: 'linear-gradient(135deg, #1a1612 0%, #2a1f1a 50%, #241612 100%)',
          ink: '#ffffff', accent: '#e8631b',
        },
        {
          value: '06-editorial-press',
          label: '06 — Editorial Press',
          desc: 'Magazin, Italic, Issue-Nummern',
          type: 'press',
          bg: '#f5f0e8', ink: '#1a1a2e', accent: '#e8631b',
        },
        {
          value: '07-terminal-console',
          label: '07 — Terminal Console',
          desc: 'Dev-Aesthetik, Mono, Window',
          type: 'terminal',
          bg: '#0a0e14', ink: '#f0f6fc', accent: '#e8631b',
        },
        {
          value: '08-soft-bloom',
          label: '08 — Soft Bloom',
          desc: 'Organisch, weich, Pastell',
          type: 'bloom',
          bg: '#fef9f1', ink: '#1a1a2e', accent: '#e8631b',
        },
        {
          value: '09-luxe-atelier',
          label: '09 — Luxe Atelier',
          desc: 'Premium Boutique, Serif, Ornament',
          type: 'luxe',
          bg: '#faf7f2', ink: '#1a1a1a', accent: '#c89f4a',
        },
        {
          value: '10-pop-studio',
          label: '10 — Pop Studio',
          desc: 'Bunt, verspielt, Sticker-Look',
          type: 'pop',
          bg: '#fef6e8', ink: '#1a1a2e', accent: '#e8631b',
        },
      ];

      // Helper: small typography blocks
      var bar = function(w, hpx, c, opacity, radius) {
        return h('div', {
          style: {
            width: w, height: hpx + 'px',
            background: c, borderRadius: (radius || 2) + 'px',
            opacity: opacity || 1
          }
        });
      };

      var renderWarm = function(d) {
        return h('div', { style: { background: d.bg, padding: '14px', height: '180px', position: 'relative' } },
          h('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: '14px' } },
            bar('40px', 6, d.ink, 0.85),
            h('div', { style: { display: 'flex', gap: '6px', alignItems: 'center' } },
              bar('20px', 3, d.ink, 0.35),
              bar('20px', 3, d.ink, 0.35),
              bar('30px', 12, d.accent, 1, 4),
            )
          ),
          h('div', { style: { display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: '12px' } },
            h('div', null,
              bar('50%', 5, d.accent, 1),
              h('div', { style: { height: '6px' } }),
              bar('85%', 11, d.ink, 0.9, 3),
              h('div', { style: { height: '4px' } }),
              bar('70%', 7, d.ink, 0.35),
              h('div', { style: { height: '10px' } }),
              h('div', { style: { display: 'flex', gap: '6px' } },
                bar('40px', 14, d.accent, 1, 4),
                bar('40px', 14, d.ink, 0.15, 4),
              )
            ),
            h('div', { style: { background: '#fff', borderRadius: '6px', padding: '6px', border: '1px solid rgba(0,0,0,.06)' } },
              h('div', { style: { display: 'flex', gap: '3px', marginBottom: '6px' } },
                h('div', { style: { width: '4px', height: '4px', borderRadius: '50%', background: '#ff5f57' } }),
                h('div', { style: { width: '4px', height: '4px', borderRadius: '50%', background: '#ffbd2e' } }),
                h('div', { style: { width: '4px', height: '4px', borderRadius: '50%', background: '#28c840' } }),
              ),
              bar('80%', 4, d.ink, 0.5),
              h('div', { style: { height: '3px' } }),
              bar('60%', 4, d.ink, 0.3),
              h('div', { style: { height: '3px' } }),
              bar('30%', 8, d.accent, 1, 2),
            )
          )
        );
      };

      var renderEditorial = function(d) {
        return h('div', { style: { background: d.bg, padding: '16px', height: '180px', color: d.ink, position: 'relative', overflow: 'hidden' } },
          // Massive faded watermark
          h('div', {
            style: {
              position: 'absolute', right: '-20px', top: '50%', transform: 'translateY(-50%)',
              fontSize: '120px', fontFamily: 'Georgia, serif', fontWeight: 700,
              color: 'rgba(255,255,255,.04)', lineHeight: 1
            }
          }, 'WEB'),
          h('div', { style: { position: 'relative', zIndex: 1 } },
            h('div', { style: { fontSize: '8px', color: d.accent, letterSpacing: '.2em', marginBottom: '10px', textTransform: 'uppercase' } }, 'Editorial'),
            h('div', { style: { fontSize: '32px', fontFamily: 'Georgia, serif', lineHeight: 1, fontStyle: 'italic', color: d.ink, fontWeight: 700, letterSpacing: '-.02em' } }, 'Bold.'),
            h('div', { style: { borderTop: '1px solid rgba(255,255,255,.15)', marginTop: '16px', paddingTop: '10px', display: 'flex', gap: '12px' } },
              h('div', { style: { flex: 1 } },
                bar('90%', 3, d.ink, 0.5),
                h('div', { style: { height: '4px' } }),
                bar('60%', 3, d.ink, 0.3),
              ),
              h('div', { style: { display: 'flex', flexDirection: 'column', gap: '4px' } },
                bar('40px', 10, d.accent, 1, 2),
                bar('40px', 10, d.ink, 0.15, 2),
              )
            )
          )
        );
      };

      var renderMinimal = function(d) {
        return h('div', { style: { background: d.bg, padding: '24px 16px', height: '180px', borderBottom: '1px solid #eee' } },
          h('div', { style: { borderBottom: '1px solid #eee', paddingBottom: '4px', marginBottom: '14px', display: 'inline-block' } },
            h('div', { style: { fontSize: '7px', letterSpacing: '.2em', color: '#888', textTransform: 'uppercase' } }, 'Webdesign')
          ),
          h('div', { style: { fontSize: '24px', fontFamily: 'Georgia, serif', lineHeight: 1.1, color: d.ink, fontWeight: 400, marginBottom: '10px' } }, 'Klar.'),
          bar('72%', 4, d.ink, 0.4),
          h('div', { style: { height: '4px' } }),
          bar('55%', 4, d.ink, 0.3),
          h('div', { style: { height: '14px' } }),
          h('div', { style: { display: 'flex', gap: '14px', alignItems: 'center' } },
            h('div', { style: { fontSize: '9px', color: d.ink, borderBottom: '1.5px solid ' + d.ink, paddingBottom: '2px' } }, 'Anfragen →'),
            h('div', { style: { fontSize: '9px', color: '#999' } }, 'Mehr')
          )
        );
      };

      var renderSplit = function(d) {
        return h('div', { style: { display: 'flex', height: '180px', overflow: 'hidden' } },
          h('div', { style: { flex: 1, background: d.bg, padding: '14px' } },
            bar('45%', 4, d.accent, 1),
            h('div', { style: { height: '8px' } }),
            bar('80%', 9, d.ink, 0.85, 3),
            h('div', { style: { height: '4px' } }),
            bar('60%', 9, d.ink, 0.85, 3),
            h('div', { style: { height: '8px' } }),
            bar('70%', 4, d.ink, 0.35),
            h('div', { style: { height: '14px' } }),
            h('div', { style: { display: 'flex', gap: '5px' } },
              bar('40px', 14, d.accent, 1, 4),
              bar('40px', 14, 'transparent', 1, 4),
            )
          ),
          h('div', { style: { flex: 1, background: d.bg2, padding: '14px', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '8px', position: 'relative' } },
            h('div', { style: { background: 'rgba(255,255,255,.08)', backdropFilter: 'blur(4px)', border: '1px solid rgba(255,255,255,.15)', borderRadius: '6px', padding: '7px 10px', display: 'flex', gap: '7px', alignItems: 'center' } },
              h('div', { style: { width: '14px', height: '14px', borderRadius: '50%', background: d.accent, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '8px' } }, '✓'),
              bar('45px', 4, '#fff', 0.65)
            ),
            h('div', { style: { background: 'rgba(255,255,255,.08)', backdropFilter: 'blur(4px)', border: '1px solid rgba(255,255,255,.15)', borderRadius: '6px', padding: '7px 10px', display: 'flex', gap: '7px', alignItems: 'center' } },
              h('div', { style: { width: '14px', height: '14px', borderRadius: '50%', background: d.accent, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '8px' } }, '★'),
              bar('45px', 4, '#fff', 0.65)
            ),
          )
        );
      };

      var renderGradient = function(d) {
        return h('div', { style: { background: d.bg, padding: '20px 16px', height: '180px', position: 'relative', overflow: 'hidden', textAlign: 'center' } },
          // Orb glows
          h('div', { style: { position: 'absolute', width: '120px', height: '120px', borderRadius: '50%', background: 'radial-gradient(circle, rgba(232,99,27,.4) 0%, transparent 70%)', top: '-30px', right: '-30px' } }),
          h('div', { style: { position: 'absolute', width: '90px', height: '90px', borderRadius: '50%', background: 'radial-gradient(circle, rgba(232,99,27,.3) 0%, transparent 70%)', bottom: '-30px', left: '-20px' } }),
          h('div', { style: { position: 'relative', zIndex: 1 } },
            h('div', { style: { display: 'inline-block', background: 'rgba(255,255,255,.12)', border: '1px solid rgba(255,255,255,.2)', borderRadius: '100px', padding: '2px 8px', fontSize: '7px', color: 'rgba(255,255,255,.85)', letterSpacing: '.1em', textTransform: 'uppercase', marginBottom: '8px' } }, 'Webdesign'),
            h('div', { style: { fontSize: '22px', fontFamily: 'Georgia, serif', color: '#fff', fontWeight: 400, lineHeight: 1.1, marginBottom: '8px' } }, 'Modern.'),
            h('div', { style: { fontSize: '7px', color: 'rgba(255,255,255,.5)', marginBottom: '12px' } }, 'Auffällig & dynamisch'),
            h('div', { style: { display: 'flex', gap: '6px', justifyContent: 'center', marginBottom: '14px' } },
              h('div', { style: { width: '50px', height: '14px', background: d.accent, borderRadius: '100px', boxShadow: '0 0 12px rgba(232,99,27,.6)' } }),
              h('div', { style: { width: '50px', height: '14px', background: 'rgba(255,255,255,.1)', border: '1px solid rgba(255,255,255,.2)', borderRadius: '100px' } }),
            ),
            h('div', { style: { display: 'flex', gap: '6px', justifyContent: 'center', borderTop: '1px solid rgba(255,255,255,.15)', paddingTop: '6px' } },
              h('div', { style: { fontSize: '8px', color: '#fff', fontWeight: 700 } }, '50+'),
              h('div', { style: { fontSize: '8px', color: 'rgba(255,255,255,.4)' } }, '|'),
              h('div', { style: { fontSize: '8px', color: '#fff', fontWeight: 700 } }, '3 Wo.'),
              h('div', { style: { fontSize: '8px', color: 'rgba(255,255,255,.4)' } }, '|'),
              h('div', { style: { fontSize: '8px', color: '#fff', fontWeight: 700 } }, '5★'),
            )
          )
        );
      };

      var renderPress = function(d) {
        return h('div', { style: { background: d.bg, padding: '14px 16px', height: '180px', position: 'relative', fontFamily: 'Georgia, serif' } },
          h('div', { style: { display: 'flex', justifyContent: 'space-between', fontStyle: 'italic', fontSize: '7px', color: d.ink, marginBottom: '6px' } },
            h('span', null, 'Issue Nº 01'),
            h('span', null, 'Vol. 2026'),
          ),
          h('div', { style: { borderTop: '2px solid ' + d.ink, marginBottom: '12px' } }),
          h('div', { style: { display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: '10px' } },
            h('div', null,
              h('div', { style: { fontSize: '24px', color: d.accent, lineHeight: 1, fontStyle: 'italic', marginBottom: '4px', fontWeight: 700 } }, '01'),
              h('div', { style: { fontSize: '6px', color: d.ink, letterSpacing: '.2em', textTransform: 'uppercase', borderTop: '1px solid ' + d.ink, paddingTop: '3px', display: 'inline-block', marginBottom: '5px' } }, 'Webdesign'),
              h('div', { style: { fontSize: '20px', fontStyle: 'italic', color: d.accent, lineHeight: 1.05, fontWeight: 400 } }, 'Lesen.'),
              h('div', { style: { fontSize: '14px', color: d.ink, lineHeight: 1.05, fontWeight: 400 } }, 'Sehen.'),
            ),
            h('div', { style: { background: d.ink, color: d.bg, padding: '8px', position: 'relative', display: 'flex', alignItems: 'flex-end', minHeight: '90px' } },
              h('div', { style: { position: 'absolute', top: '6px', right: '8px', fontSize: '24px', color: d.accent, fontStyle: 'italic', lineHeight: 1 } }, '01'),
              h('div', { style: { fontSize: '7px', fontStyle: 'italic', color: d.bg, lineHeight: 1.3 } }, 'Editorial'),
            )
          ),
          h('div', { style: { borderTop: '2px solid ' + d.ink, marginTop: '8px', paddingTop: '4px', fontSize: '6px', fontStyle: 'italic', color: d.ink, opacity: .7 } }, 'In dieser Ausgabe: i Über · ii Leistungen · iii Pakete')
        );
      };

      var renderTerminal = function(d) {
        return h('div', { style: { background: d.bg, padding: '14px', height: '180px', fontFamily: '"SF Mono", monospace' } },
          h('div', { style: { background: '#0d1117', border: '1px solid #1f2933', borderRadius: '6px', overflow: 'hidden', boxShadow: '0 10px 30px rgba(0,0,0,.5)' } },
            // Title bar
            h('div', { style: { background: '#161c24', padding: '5px 8px', display: 'flex', alignItems: 'center', gap: '8px', borderBottom: '1px solid #1f2933' } },
              h('div', { style: { display: 'flex', gap: '3px' } },
                h('div', { style: { width: '6px', height: '6px', borderRadius: '50%', background: '#ff5f57' } }),
                h('div', { style: { width: '6px', height: '6px', borderRadius: '50%', background: '#ffbd2e' } }),
                h('div', { style: { width: '6px', height: '6px', borderRadius: '50%', background: '#28c840' } }),
              ),
              h('div', { style: { fontSize: '7px', color: '#6b7785' } }, '~/welcome.sh'),
              h('div', { style: { marginLeft: 'auto', fontSize: '7px', color: '#7ee787' } }, '● online')
            ),
            // Body
            h('div', { style: { padding: '10px 12px' } },
              h('div', { style: { fontSize: '8px', color: '#6b7785', marginBottom: '4px' } },
                h('span', { style: { color: d.accent } }, '$ '), 'whoami'
              ),
              h('div', { style: { fontSize: '8px', color: '#79c0ff', marginBottom: '8px' } }, '> webdesign'),
              h('div', { style: { fontSize: '16px', color: d.ink, fontWeight: 700, lineHeight: 1.1, marginBottom: '6px', fontFamily: 'Outfit, sans-serif' } },
                'Code.', h('span', { style: { color: d.accent, animation: 'tcb 1s steps(2) infinite' } }, '_')
              ),
              h('div', { style: { fontSize: '7px', color: '#6b7785', marginBottom: '6px' } },
                h('span', { style: { color: d.accent } }, '$ '), 'deploy --action'
              ),
              h('div', { style: { display: 'flex', gap: '5px' } },
                h('div', { style: { background: d.accent, color: d.bg, fontSize: '7px', padding: '3px 7px', borderRadius: '3px', fontWeight: 700 } }, '[ run ]'),
                h('div', { style: { border: '1px solid #2c343d', color: '#c5cdd6', fontSize: '7px', padding: '3px 7px', borderRadius: '3px' } }, '[ docs ]'),
              )
            ),
            // Statusbar
            h('div', { style: { background: d.bg, borderTop: '1px solid #1f2933', padding: '3px 8px', fontSize: '6px', color: '#6b7785', display: 'flex', gap: '6px' } },
              h('span', null, '● main'),
              h('span', { style: { color: '#2c343d' } }, '│'),
              h('span', null, 'UTF-8'),
              h('span', { style: { marginLeft: 'auto', color: d.accent } }, '12:00:00'),
            )
          )
        );
      };

      var renderBloom = function(d) {
        return h('div', { style: { background: 'linear-gradient(180deg, #fef9f1 0%, #fef4e6 100%)', padding: '16px', height: '180px', position: 'relative', overflow: 'hidden', textAlign: 'center' } },
          // Blob shapes
          h('div', { style: { position: 'absolute', top: '-30px', right: '-30px', width: '120px', height: '120px', borderRadius: '60% 40% 50% 50% / 50% 60% 40% 50%', background: d.accent, opacity: .15 } }),
          h('div', { style: { position: 'absolute', bottom: '-20px', left: '-30px', width: '100px', height: '100px', borderRadius: '50% 60% 40% 50% / 60% 40% 60% 50%', background: '#4a7c6f', opacity: .2 } }),
          h('div', { style: { position: 'relative', zIndex: 1 } },
            h('div', { style: { fontSize: '8px', fontStyle: 'italic', color: d.accent, marginBottom: '5px', fontFamily: 'Georgia, serif' } }, '— Hallo, schön'),
            h('div', { style: { display: 'inline-block', background: 'rgba(255,255,255,.7)', border: '1px solid rgba(232,99,27,.15)', borderRadius: '100px', padding: '3px 9px', fontSize: '7px', color: d.ink, fontWeight: 600, marginBottom: '8px' } },
              h('span', { style: { color: d.accent, marginRight: '3px' } }, '●'), 'Webdesign'
            ),
            h('div', { style: { fontSize: '22px', fontFamily: 'Georgia, serif', color: d.ink, fontWeight: 400, lineHeight: 1.05, marginBottom: '8px' } }, 'Sanft.'),
            h('div', { style: { display: 'flex', gap: '5px', justifyContent: 'center', marginBottom: '10px' } },
              h('div', { style: { background: d.accent, color: '#fff', borderRadius: '100px', padding: '4px 10px', fontSize: '7px', fontWeight: 600, boxShadow: '0 4px 0 -1px rgba(232,99,27,.3)' } }, 'Anfragen →'),
              h('div', { style: { background: '#fff', color: d.ink, borderRadius: '100px', padding: '4px 10px', fontSize: '7px', fontWeight: 600, border: '1px solid rgba(0,0,0,.08)' } }, 'Mehr'),
            ),
            h('div', { style: { display: 'inline-flex', alignItems: 'center', gap: '8px', background: '#fff', borderRadius: '14px', padding: '5px 9px', boxShadow: '0 8px 20px rgba(232,99,27,.1)' } },
              h('div', { style: { width: '14px', height: '14px', borderRadius: '50%', background: 'linear-gradient(135deg, ' + d.accent + ', #ff8c42)', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '8px' } }, '★'),
              h('div', { style: { fontSize: '7px', color: d.ink, fontFamily: 'Georgia, serif' } }, '5,0 / 5'),
            )
          )
        );
      };

      var renderLuxe = function(d) {
        return h('div', { style: { background: d.bg, padding: '20px', height: '180px', position: 'relative', textAlign: 'center', fontFamily: 'Georgia, serif' } },
          // Frame border
          h('div', { style: { position: 'absolute', inset: '8px', border: '1px solid rgba(0,0,0,.12)', pointerEvents: 'none' } }),
          // Corner accents
          h('div', { style: { position: 'absolute', top: '8px', left: '8px', width: '10px', height: '10px', borderTop: '1px solid ' + d.accent, borderLeft: '1px solid ' + d.accent } }),
          h('div', { style: { position: 'absolute', top: '8px', right: '8px', width: '10px', height: '10px', borderTop: '1px solid ' + d.accent, borderRight: '1px solid ' + d.accent } }),
          h('div', { style: { position: 'absolute', bottom: '8px', left: '8px', width: '10px', height: '10px', borderBottom: '1px solid ' + d.accent, borderLeft: '1px solid ' + d.accent } }),
          h('div', { style: { position: 'absolute', bottom: '8px', right: '8px', width: '10px', height: '10px', borderBottom: '1px solid ' + d.accent, borderRight: '1px solid ' + d.accent } }),
          h('div', { style: { position: 'relative', zIndex: 1, paddingTop: '12px' } },
            h('div', { style: { fontSize: '7px', fontStyle: 'italic', letterSpacing: '.3em', textTransform: 'uppercase', color: d.accent, marginBottom: '12px' } }, '— Atelier —'),
            h('div', { style: { fontSize: '24px', color: d.ink, fontWeight: 400, lineHeight: 1.05, marginBottom: '10px' } }, 'Élégance.'),
            h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px', marginBottom: '10px' } },
              h('div', { style: { width: '20px', height: '1px', background: d.accent } }),
              h('div', { style: { fontSize: '8px', color: d.accent } }, '❦'),
              h('div', { style: { width: '20px', height: '1px', background: d.accent } }),
            ),
            h('div', { style: { fontSize: '7px', fontStyle: 'italic', color: 'rgba(0,0,0,.5)', marginBottom: '10px' } }, 'Webdesign d\'Auteur'),
            h('div', { style: { display: 'inline-block', border: '1px solid ' + d.ink, padding: '4px 14px', fontSize: '7px', letterSpacing: '.2em', textTransform: 'uppercase', color: d.ink } }, 'Anfragen'),
          )
        );
      };

      var renderPop = function(d) {
        return h('div', { style: { background: d.bg, padding: '16px', height: '180px', position: 'relative', overflow: 'hidden', textAlign: 'center' } },
          // Geometric shapes
          h('div', { style: { position: 'absolute', top: '8%', right: '6%', width: '32px', height: '32px', borderRadius: '50%', background: d.accent, opacity: .85 } }),
          h('div', { style: { position: 'absolute', top: '55%', left: '5%', width: '22px', height: '22px', background: '#4a7c6f', borderRadius: '4px', transform: 'rotate(15deg)' } }),
          h('div', { style: { position: 'absolute', top: '32%', left: '8%', fontSize: '14px', color: '#6c3aff', fontWeight: 900 } }, '✕'),
          // Sticker
          h('div', { style: { position: 'absolute', top: '12px', right: '20px', background: '#ffd23f', color: d.ink, padding: '2px 7px', borderRadius: '100px', fontSize: '7px', fontWeight: 800, textTransform: 'uppercase', border: '1.5px solid ' + d.ink, boxShadow: '2px 2px 0 ' + d.ink, transform: 'rotate(-8deg)' } },
            h('span', { style: { color: d.accent, marginRight: '2px' } }, '★'), 'Web'
          ),
          h('div', { style: { position: 'relative', zIndex: 1, paddingTop: '24px' } },
            h('div', { style: { fontSize: '20px', fontFamily: 'Georgia, serif', color: d.ink, lineHeight: 1, marginBottom: '4px' } }, 'Bunt.'),
            h('div', { style: { display: 'inline-block', background: d.accent, color: '#fff', padding: '0 5px', borderRadius: '4px', fontSize: '16px', fontFamily: 'Georgia, serif', fontStyle: 'italic', transform: 'rotate(-2deg)', boxShadow: '3px 3px 0 ' + d.ink, marginBottom: '12px' } }, 'Laut.'),
            h('div', { style: { display: 'flex', gap: '6px', justifyContent: 'center', marginTop: '12px' } },
              h('div', { style: { background: d.ink, color: d.bg, fontSize: '7px', padding: '3px 8px', borderRadius: '100px', fontWeight: 800, textTransform: 'uppercase', border: '1.5px solid ' + d.ink, boxShadow: '3px 3px 0 ' + d.accent } }, 'Anfragen →'),
              h('div', { style: { background: '#fff', color: d.ink, fontSize: '7px', padding: '3px 8px', borderRadius: '100px', fontWeight: 800, textTransform: 'uppercase', border: '1.5px solid ' + d.ink, boxShadow: '3px 3px 0 #4a7c6f' } }, 'Mehr')
            )
          )
        );
      };

      var renderers = {
        warm: renderWarm,
        editorial: renderEditorial,
        minimal: renderMinimal,
        split: renderSplit,
        gradient: renderGradient,
        press: renderPress,
        terminal: renderTerminal,
        bloom: renderBloom,
        luxe: renderLuxe,
        pop: renderPop,
      };

      var DesignPickerControl = createClass({
        handleSelect: function(value) {
          this.props.onChange(value);
        },

        render: function() {
          var self = this;
          var value = this.props.value;

          return h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: '16px', padding: '8px 0' } },
            designs.map(function(d) {
              var selected = value === d.value;
              var renderer = renderers[d.type] || renderWarm;
              return h('div', {
                key: d.value,
                onClick: function() { self.handleSelect(d.value); },
                style: {
                  cursor: 'pointer',
                  borderRadius: '12px',
                  overflow: 'hidden',
                  border: selected ? '3px solid #6d28d9' : '2px solid #e5e7eb',
                  boxShadow: selected ? '0 0 0 4px rgba(109,40,217,0.15), 0 8px 24px rgba(0,0,0,.08)' : '0 4px 12px rgba(0,0,0,.04)',
                  transition: 'all 0.18s',
                  background: '#fff',
                },
              },
                renderer(d),
                h('div', { style: { padding: '12px 14px', background: selected ? '#6d28d9' : '#f9fafb', borderTop: '1px solid #e5e7eb' } },
                  h('div', { style: { fontSize: '13px', fontWeight: '700', color: selected ? '#fff' : '#111827', marginBottom: '3px' } }, d.label),
                  h('div', { style: { fontSize: '11px', color: selected ? 'rgba(255,255,255,0.85)' : '#6b7280' } }, d.desc)
                )
              );
            })
          );
        },
      });

      CMS.registerWidget('design-picker', DesignPickerControl, null);
    </script>
  </body>
</html>
