<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Admin</title>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      var h = window.h;
      var createClass = window.createClass;

      var designs = [
        {
          value: '01-warm-local',
          label: '01 – Warm & Lokal',
          desc: 'Klassisch, warm, lokal',
          bg: '#f5f0e8',
          ink: '#1a1a2e',
          accent: '#e8631b',
          split: false,
        },
        {
          value: '02-bold-editorial',
          label: '02 – Bold Editorial',
          desc: 'Dunkel, modern, mutig',
          bg: '#0d0d0d',
          ink: '#ffffff',
          accent: '#e8631b',
          split: false,
        },
        {
          value: '03-minimal-clean',
          label: '03 – Minimal Clean',
          desc: 'Hell, reduziert, klar',
          bg: '#ffffff',
          ink: '#1a1a1a',
          accent: '#1a1a1a',
          split: false,
          outlineBtn: true,
        },
        {
          value: '04-corporate-split',
          label: '04 – Corporate Split',
          desc: 'Zweigeteilt, seriös',
          bg: '#f5f0e8',
          bg2: '#1a1a2e',
          ink: '#1a1a2e',
          accent: '#e8631b',
          split: true,
        },
        {
          value: '05-vibrant-gradient',
          label: '05 – Vibrant Gradient',
          desc: 'Farbenfroh, dynamisch',
          bg: 'linear-gradient(135deg, #1a1a2e 0%, #4a1a6b 50%, #0d0d2e 100%)',
          ink: '#ffffff',
          accent: '#a855f7',
          split: false,
          gradient: true,
        },
      ];

      var DesignPickerControl = createClass({
        handleSelect: function(value) {
          this.props.onChange(value);
        },

        renderPreview: function(d) {
          var bgStyle = d.gradient
            ? { background: d.bg, padding: '10px', height: '90px', position: 'relative', overflow: 'hidden' }
            : d.split
            ? { display: 'flex', height: '90px', overflow: 'hidden' }
            : { background: d.bg, padding: '10px', height: '90px', position: 'relative', overflow: 'hidden' };

          if (d.split) {
            return h('div', { style: bgStyle },
              // Left half
              h('div', { style: { flex: 1, background: d.bg, padding: '8px' } },
                h('div', { style: { width: '50%', height: '7px', background: d.ink, borderRadius: '3px', marginBottom: '6px', opacity: 0.9 } }),
                h('div', { style: { width: '70%', height: '5px', background: d.ink, borderRadius: '3px', marginBottom: '4px', opacity: 0.4 } }),
                h('div', { style: { width: '50%', height: '5px', background: d.ink, borderRadius: '3px', opacity: 0.3 } }),
                h('div', { style: { width: '36px', height: '12px', background: d.accent, borderRadius: '3px', marginTop: '10px' } }),
              ),
              // Right half
              h('div', { style: { flex: 1, background: d.bg2, padding: '8px', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', gap: '5px' } },
                h('div', { style: { width: '40px', height: '4px', background: 'rgba(255,255,255,0.3)', borderRadius: '2px' } }),
                h('div', { style: { width: '30px', height: '4px', background: 'rgba(255,255,255,0.2)', borderRadius: '2px' } }),
                h('div', { style: { width: '35px', height: '4px', background: 'rgba(255,255,255,0.15)', borderRadius: '2px' } }),
              )
            );
          }

          return h('div', { style: bgStyle },
            // Nav
            h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' } },
              h('div', { style: { width: '36px', height: '5px', background: d.ink, borderRadius: '3px', opacity: 0.85 } }),
              h('div', { style: { display: 'flex', gap: '5px', alignItems: 'center' } },
                h('div', { style: { width: '18px', height: '3px', background: d.ink, borderRadius: '2px', opacity: 0.35 } }),
                h('div', { style: { width: '18px', height: '3px', background: d.ink, borderRadius: '2px', opacity: 0.35 } }),
                h('div', { style: { width: '22px', height: '10px', background: d.accent, borderRadius: '3px', opacity: 0.9 } }),
              )
            ),
            // Headline
            h('div', { style: { width: '75%', height: '9px', background: d.ink, borderRadius: '3px', marginBottom: '5px', opacity: 0.9 } }),
            h('div', { style: { width: '55%', height: '6px', background: d.ink, borderRadius: '3px', marginBottom: '3px', opacity: 0.35 } }),
            h('div', { style: { width: '45%', height: '5px', background: d.ink, borderRadius: '3px', opacity: 0.25 } }),
            // Button
            d.outlineBtn
              ? h('div', { style: { width: '38px', height: '12px', border: '1.5px solid ' + d.accent, borderRadius: '3px', marginTop: '8px' } })
              : h('div', { style: { width: '38px', height: '12px', background: d.accent, borderRadius: '3px', marginTop: '8px' } })
          );
        },

        render: function() {
          var self = this;
          var value = this.props.value;

          return h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(160px, 1fr))', gap: '10px', padding: '4px 0' } },
            designs.map(function(d) {
              var selected = value === d.value;
              return h('div', {
                key: d.value,
                onClick: function() { self.handleSelect(d.value); },
                style: {
                  cursor: 'pointer',
                  borderRadius: '8px',
                  overflow: 'hidden',
                  border: selected ? '2px solid #6d28d9' : '2px solid #d1d5db',
                  boxShadow: selected ? '0 0 0 3px rgba(109,40,217,0.2)' : 'none',
                  transition: 'all 0.15s',
                },
              },
                self.renderPreview(d),
                h('div', { style: { padding: '8px 10px', background: selected ? '#6d28d9' : '#f9fafb', borderTop: '1px solid #e5e7eb' } },
                  h('div', { style: { fontSize: '11px', fontWeight: '700', color: selected ? '#fff' : '#111827', marginBottom: '2px' } }, d.label),
                  h('div', { style: { fontSize: '10px', color: selected ? 'rgba(255,255,255,0.75)' : '#6b7280' } }, d.desc)
                )
              );
            })
          );
        },
      });

      CMS.registerWidget('design-picker', DesignPickerControl, null);
    </script>
  </body>
</html>
