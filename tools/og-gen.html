<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #f5f0e8;
    font-family: 'Outfit', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    width: 100%; height: 100%;
    background: #f5f0e8;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1.5rem;
    position: relative;
    padding: 60px;
  }
  .accent-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 8px; background: #c8520e;
  }
  .label {
    font-size: 14px; font-weight: 700; letter-spacing: .18em;
    text-transform: uppercase; color: #c8520e;
  }
  .name {
    font-size: 88px; font-weight: 700; line-height: 1;
    color: #1c1c1c; letter-spacing: -.02em;
  }
  .name em { color: #c8520e; font-style: normal; }
  .tagline {
    font-size: 26px; font-weight: 400; color: #1c1c1c;
    opacity: .7; text-align: center; max-width: 700px;
  }
  .divider {
    width: 60px; height: 3px; background: #c8520e;
    border-radius: 100px;
  }
  .bottom {
    position: absolute; bottom: 40px;
    font-size: 14px; color: #1c1c1c; opacity: .4;
    letter-spacing: .06em;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="accent-bar"></div>
    <div class="label">Webdesign · SEO · Pflege</div>
    <div class="name">pixel<em>&amp;code</em></div>
    <div class="divider"></div>
    <div class="tagline">Websites für kleine Unternehmen</div>
    <div class="bottom">pixelundcode.de</div>
  </div>
</body>
</html>
